spring.application.name=BookStore

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always


management.endpoints.web.base-path=/actuator

management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0

info.app.name=BookStore API
info.app.description=A Spring Boot bookstore application with full CRUD support
info.app.version=0.0.1-SNAPSHOT
info.app.java-version=21

# ── Security: disable auto-generated password in logs ────────────────────
# Users are defined in SecurityConfig (admin/admin123, user/user123)
spring.security.user.name=ignored
spring.security.user.password=ignored
